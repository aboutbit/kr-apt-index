name: Update Apt Index

on:
  schedule:
    # 매주 화요일 08:00 KST (월요일 23:00 UTC)
    # 주간 매매가격지수는 보통 월요일에 발표됨
    - cron: '0 23 * * 1'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate dashboard
        env:
          REB_API_KEY: ${{ secrets.REB_API_KEY }}
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          SKIP_FETCH: '1'
        run: node index.js

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --staged --quiet && echo "변경 없음, 커밋 건너뜀" || (
            git commit -m "Update: $(date -u '+%Y-%m-%d')" &&
            git push
          )
